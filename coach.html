<!DOCTYPE html>
<html>

<head>
    <title>StrideLab Coach</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>StrideLab</h1>
    <p>Coach Dashboard</p>
</header>


<section>

<h2>Willkommen Coach 🧑‍🏫</h2>


<div class="card">

<h3>Athleten</h3>

<p>
Athlet 1<br>
Ziel: 5 km<br>
Aktuelle Zeit: 20:00
</p>

<button>
Trainingsplan erstellen
</button>

</div>



<div class="card">

<h3>Neue Trainingswoche</h3>

<input id="monday" placeholder="Montag Training">

<input id="tuesday" placeholder="Dienstag Training">

<input id="wednesday" placeholder="Mittwoch Training">

<input id="thursday" placeholder="Donnerstag Training">

<input id="saturday" placeholder="Samstag Training">

<br><br>

<button onclick="savePlan()">
Plan speichern
</button>

<h3 id="message"></h3>

</div>


</section>
    
<script src="coach.js"></script>

</body>

</html>
