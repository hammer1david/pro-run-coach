<!DOCTYPE html>
<html>

<head>
    <title>StrideLab Coach</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>StrideLab</h1>
    <p>Coach Dashboard</p>
</header>


<section>

<h2>Willkommen Coach 🧑‍🏫</h2>


<div class="card">

<h3>Athleten</h3>

<p>
Athlet 1<br>
Ziel: 5 km<br>
Aktuelle Zeit: 20:00
</p>

<button>
Trainingsplan erstellen
</button>

</div>



<div class="card">

<h3>Neue Trainingswoche</h3>

<label>Montag</label>
<input placeholder="z.B. 8 km locker">


<label>Dienstag</label>
<input placeholder="z.B. 6x1000m Intervalle">


<label>Donnerstag</label>
<input placeholder="z.B. Tempolauf">


<label>Samstag</label>
<input placeholder="z.B. langer Lauf">


<br><br>

<button>
Plan speichern
</button>

</div>


</section>


</body>

</html>
