<!DOCTYPE html>
<html>

<head>
    <title>StrideLab Athlete</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>


<header>

<h1>StrideLab 🏃</h1>

<p>Athleten Plattform</p>

</header>



<section>


<h2>Willkommen Athlet 👋</h2>



<div class="card">


<h3 onclick="toggleProfile()">
👤 Profil ▼
</h3>



<div id="profile">


<p>
Name:
</p>
<input id="profileName" placeholder="Dein Name">



<p>
Alter:
</p>
<input id="profileAge" type="number" placeholder="Alter">



<p>
Bestzeiten:
</p>
<textarea id="profileTimes" placeholder="z.B. 1500m: 3:55&#10;5km: 14:40&#10;10km: 31:20"></textarea>



<p>
Ziele:
</p>
<textarea id="profileGoals" placeholder="Was möchtest du erreichen?"></textarea>



<hr>



<p>
Anzahl Trainingstage pro Woche:
</p>

<select id="trainingDays">

<option value="3">3 Tage</option>
<option value="4">4 Tage</option>
<option value="5">5 Tage</option>
<option value="6">6 Tage</option>
<option value="7">7 Tage</option>

</select>



<p>
Gewünschte Trainingstage:
</p>


<label>
<input type="checkbox" class="weekday" value="Montag">
Montag
</label>


<label>
<input type="checkbox" class="weekday" value="Dienstag">
Dienstag
</label>


<label>
<input type="checkbox" class="weekday" value="Mittwoch">
Mittwoch
</label>


<label>
<input type="checkbox" class="weekday" value="Donnerstag">
Donnerstag
</label>


<label>
<input type="checkbox" class="weekday" value="Freitag">
Freitag
</label>


<label>
<input type="checkbox" class="weekday" value="Samstag">
Samstag
</label>


<label>
<input type="checkbox" class="weekday" value="Sonntag">
Sonntag
</label>


</div>



<p id="profileStatus">
⚠️ Profil noch nicht ausgefüllt
</p>



<button onclick="saveProfile()">
Profil speichern
</button>


<button onclick="editProfile()">
Profil bearbeiten
</button>



</div>







<div class="card">


<h3 onclick="toggleWeeks()">
📅 Wochenplan ▼
</h3>



<div id="weeks">



<a href="training.html?week=1">

<button>
Woche 1
</button>

</a>



<a href="training.html?week=2">

<button>
Woche 2
</button>

</a>



<a href="training.html?week=3">

<button>
Woche 3
</button>

</a>



<a href="training.html?week=4">

<button>
Woche 4
</button>

</a>



</div>



</div>







<div class="card">


<h3 onclick="toggleFeedback()">
📝 Feedback ▼
</h3>



<div id="feedback">


<textarea placeholder="Wie hat sich das Training angefühlt?"></textarea>



<textarea placeholder="Schlaf, Beine, Gesundheit..."></textarea>



<button>
Feedback speichern
</button>



</div>



</div>







<div class="card">


<h3 onclick="toggleProgress()">
📊 Fortschritt ▼
</h3>



<div id="progress">


<p>
Kilometer:
</p>


<p>
Absolvierte Trainings:
</p>


<p>
Entwicklung:
</p>



</div>



</div>





</section>





<script src="athlete.js"></script>


</body>

</html>
