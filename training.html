<!DOCTYPE html>
<html>

<head>
    <title>StrideLab Training</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>StrideLab</h1>
    <p>Dein persönlicher Trainingsplan</p>
</header>


<section>

<h2>Diese Woche 🏃</h2>


<div class="card">

<label>
<input type="checkbox">
<strong>Monday:</strong>
<span id="monday"></span>
</label>

<br>

<textarea placeholder="Notiz zu diesem Training"></textarea>

</div>



<div class="card">

<label>
<input type="checkbox">
<strong>Tuesday:</strong>
<span id="tuesday"></span>
</label>

<br>

<textarea placeholder="Notiz zu diesem Training"></textarea>

</div>



<div class="card">

<label>
<input type="checkbox">
<strong>Wednesday:</strong>
<span id="wednesday"></span>
</label>

<br>

<textarea placeholder="Notiz zu diesem Training"></textarea>

</div>



<div class="card">

<label>
<input type="checkbox">
<strong>Thursday:</strong>
<span id="thursday"></span>
</label>

<br>

<textarea placeholder="Notiz zu diesem Training"></textarea>

</div>

<div class="card">

<label>
<input type="checkbox">
<strong>Friday:</strong>
<span id="friday"></span>
</label>

<br>

<textarea placeholder="Notiz zu diesem Training"></textarea>

</div>

<div class="card">

<label>
<input type="checkbox">
<strong>Saturday:</strong>
<span id="saturday"></span>
</label>

<br>

<textarea placeholder="Notiz zu diesem Training"></textarea>

</div>

<div class="card">

<label>
<input type="checkbox">
<strong>Sunday:</strong>
<span id="sunday"></span>
</label>

<br>

<textarea placeholder="Notiz zu diesem Training"></textarea>

</div>

<button onclick="saveProgress()">
Fortschritt speichern
</button>

<h3>Dein Feedback an den Coach</h3>

<textarea id="feedback" placeholder="Wie hat sich das Training angefühlt?"></textarea>

<br>

<button onclick="saveFeedback()">
Feedback senden
</button>


</section>
<script src="training.js"></script>

</body>

</html>
