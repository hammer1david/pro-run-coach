<!DOCTYPE html>

<body>

<header>
    <h1>StrideLab</h1>

</header>
    
<button onclick="goBack()">
⬅️ Zurück zum Profil
</button>

<section>

<h2>Wochenplan 🏃</h2>

<label>Coach Training:</label>
<textarea id="mondayTraining" placeholder="Training eingeben"></textarea>

<label>Coach Anweisung:</label>
<textarea id="mondayCoachNote" placeholder="Anweisungen vom Coach"></textarea>

<label>
<input type="checkbox" id="mondayDone">
Training erledigt
</label>

<label>Meine Notiz:</label>
<textarea id="mondayAthleteNote" placeholder="Wie hat sich das Training angefühlt?"></textarea>

</div>
