<!DOCTYPE html>
<html>
<head>
    <title>StrideLab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>StrideLab</h1>
    <p>Built on elite training. Personalized for you.</p>
</header>

<section>
    <h2>Erstelle deinen persönlichen Trainingsplan</h2>

    <label>Dein Ziel:</label>
    <select id="distance">
        <option>5 km</option>
        <option>10 km</option>
        <option>Halbmarathon</option>
        <option>Marathon</option>
    </select>

    <br><br>

    <label>Deine aktuelle Bestzeit:</label>
    <input id="currentTime" placeholder="z.B. 20:00">

    <br><br>

    <label>Deine Zielzeit:</label>
    <input id="targetTime" placeholder="z.B. 18:00">

    <br><br>

    <label>Trainingstage pro Woche:</label>
    <select id="days">
        <option>3 Tage</option>
        <option>4 Tage</option>
        <option>5 Tage</option>
        <option>6 Tage</option>
    </select>

    <br><br>

    <button onclick="createPlan()">
        Trainingsplan erstellen
    </button>

    <h3 id="result"></h3>

</section>

<script src="script.js"></script>

</body>
</html>
