<!DOCTYPE html>
<html>

<head>

<title>StrideLab</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>StrideLab 🏃</h1>

<p>Deine digitale Trainingsplattform</p>

</header>




<section>



<div class="card">


<h2>
🏃 Athleten Login
</h2>



<p>
Benutzername:
</p>

<input id="athleteUsername" placeholder="Benutzername">



<p>
Passwort:
</p>

<input id="athletePassword" type="password" placeholder="Passwort">



<br><br>



<button onclick="athleteLogin()">

Einloggen

</button>



</div>






<br><br><br>






<div class="card" style="padding:10px; font-size:14px;">


<h4>
🧑‍🏫 Coach Login
</h4>



<input id="coachPassword" 
type="password" 
placeholder="Coach Passwort">



<button onclick="coachLogin()">

Login

</button>



</div>





</section>








<script>



function athleteLogin(){


    let username =
    document.getElementById("athleteUsername").value;



    let password =
    document.getElementById("athletePassword").value;




    if(username === "" || password === ""){


        alert("Bitte Benutzername und Passwort eingeben");


        return;

    }



    // vorläufige Version:
    // Benutzername wird als Athletenname verwendet


    window.location.href =
    "athlete.html?athlete=" + username;



}







function coachLogin(){


    let password =
    document.getElementById("coachPassword").value;



    if(password === "coach123"){


        window.location.href =
        "coach.html";


    }

    else {


        alert("Falsches Coach Passwort");


    }



}



</script>




</body>
