<!DOCTYPE html>
<html>

<head>

<title>StrideLab</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>StrideLab 🏃</h1>

<p>Deine digitale Trainingsplattform</p>

</header>




<section>


<div class="card">


<h2>
Willkommen bei StrideLab 👋
</h2>


<p>
Erstelle Trainingspläne, verfolge Fortschritte und arbeite mit deinem Coach.
</p>


</div>






<div class="card">


<h2>
Login
</h2>



<p>
Name:
</p>


<input id="loginName" placeholder="Dein Name">






<p>
Rolle:
</p>



<select id="role">


<option value="athlete">
🏃 Athlet
</option>



<option value="coach">
🧑‍🏫 Coach
</option>


</select>






<br><br>



<button onclick="login()">

Einloggen

</button>



</div>





</section>







<script>


function login(){


    let name =
    document.getElementById("loginName").value;



    let role =
    document.getElementById("role").value;





    if(role === "coach"){


        window.location.href =
        "coach.html";


    }


    else {


        if(name === ""){


            alert("Bitte Namen eingeben");


            return;

        }



        window.location.href =
        "athlete.html?athlete=" + name;


    }



}



</script>



</body>


</html>
