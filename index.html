<!DOCTYPE html>
<html>

<head>

<title>StrideLab</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>StrideLab 🏃</h1>

<p>Deine digitale Trainingsplattform</p>

</header>




<section>



<div class="card">


<h2>
🏃 Athleten Login
</h2>



<p>
Name:
</p>


<input id="athleteName" placeholder="Dein Name">



<br><br>



<button onclick="athleteLogin()">

Einloggen

</button>



</div>







<br><br><br>






<div class="card">


<h3>
🧑‍🏫 Coach Bereich
</h3>


<p>
Nur für Trainer
</p>



<input id="coachPassword" type="password" placeholder="Passwort">



<br><br>



<button onclick="coachLogin()">

Coach Login

</button>



</div>





</section>







<script>


function athleteLogin(){


    let name =
    document.getElementById("athleteName").value;



    if(name === ""){


        alert("Bitte Namen eingeben");


        return;

    }



    window.location.href =
    "athlete.html?athlete=" + name;



}






function coachLogin(){


    let password =
    document.getElementById("coachPassword").value;



    // vorläufiges Test-Passwort

    if(password === "coach123"){


        window.location.href =
        "coach.html";


    }


    else {


        alert("Falsches Passwort");


    }



}



</script>





</body>


</html>
